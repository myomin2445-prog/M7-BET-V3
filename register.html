<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M7 BET Register</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050505;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.registerBox{
width:95%;
max-width:420px;
background:#151515;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,255,0,.25);
}

h2{
text-align:center;
color:#00d000;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
background:#222;
border:none;
border-radius:8px;
color:white;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#00b300;
border:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
color:white;
cursor:pointer;
}

button:hover{
background:#00d800;
}

.bottom{
margin-top:20px;
text-align:center;
}

a{
color:#00ff66;
text-decoration:none;
}

</style>

</head>

<body>

<div class="registerBox">

<h2>📝 CREATE ACCOUNT</h2>

<input type="text" id="username" placeholder="Username">

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="register()">
CREATE ACCOUNT
</button>

<div class="bottom">

Already have an account?

<br><br>

<a href="login.html">
Login Here
</a>

</div>

</div>

<script>

function register(){

alert("Register System Coming Soon");

}

</script>

</body>
</html>
