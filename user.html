<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M7 BET - User</title>

<style>
body{margin:0;background:#0b0b0b;color:white;font-family:Arial}
.header{background:linear-gradient(135deg,#00a000,#007400);padding:28px 20px;text-align:center;box-shadow:0 4px 20px rgba(0,255,0,.35)}
.card{width:88%;max-width:520px;margin:18px auto;background:linear-gradient(180deg,#242424,#1b1b1b);padding:22px;border-radius:18px;text-align:center;box-shadow:0 8px 25px rgba(0,0,0,.35)}
.balance{font-size:34px;color:#00ff66;margin:14px 0;font-weight:bold}
.menuGrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:88%;max-width:520px;margin:20px auto}
.menuBtn{background:#eaf5f0;color:#111;border-radius:16px;padding:28px 10px;text-align:center;font-size:18px;font-weight:bold;box-shadow:0 8px 18px rgba(0,0,0,.25)}
.menuIcon{font-size:42px;margin-bottom:8px}
.section{display:none}
input{width:85%;padding:14px;margin:10px 0;border-radius:10px;background:#2f2f2f;color:white;border:1px solid #555}
button{width:85%;padding:16px;margin:10px 0;background:#00b300;color:white;border:0;border-radius:12px;font-size:18px;font-weight:bold}
.smallBtn{width:auto;padding:10px 18px;font-size:15px}
.red{color:#ff4444;font-weight:bold}
.blue{color:#4da6ff;font-weight:bold}
.green{color:#00ff66;font-weight:bold}
.badge{background:#00aa00;padding:8px 18px;border-radius:20px}
</style>
</head>

<body>

<div class="header">
  <div style="font-size:34px;">⚽</div>
  <div style="font-size:32px;font-weight:bold;">M7 BET</div>
  <div style="font-size:14px;color:#d9ffd9;margin-top:6px;">Football Betting Platform</div>
</div>

<div class="card">
  <div style="font-size:60px;">👤</div>
  <h2 id="name"></h2>
  <p>User ID</p>
  <h3 id="userid"></h3>
  <div class="balance" id="balance"></div>
</div>

<div class="menuGrid">
  <div class="menuBtn" onclick="showSection('betSection')">
    <div class="menuIcon">⚽</div>Bet
  </div>
  <div class="menuBtn" onclick="showSection('historySection')">
    <div class="menuIcon">📜</div>Bet History
  </div>
  <div class="menuBtn" onclick="showSection('depositSection')">
    <div class="menuIcon">💳</div>Deposit
  </div>
  <div class="menuBtn" onclick="showSection('withdrawSection')">
    <div class="menuIcon">🏧</div>Withdraw
  </div>
</div>

<div class="card">
  <button onclick="logout()">🚪 Logout</button>
</div>

<div id="depositSection" class="section card">
  <div style="font-size:45px;">💳</div>
  <h2>Deposit</h2>
  <input type="number" id="depositAmount" placeholder="Amount W">
  <button onclick="depositRequest()">💰 Deposit Request</button>
  <p id="msg"></p>
</div>

<div id="withdrawSection" class="section card">
  <div style="font-size:45px;">🏧</div>
  <h2>Withdraw</h2>
  <input type="number" id="withdrawAmount" placeholder="Amount W">
  <button onclick="withdrawRequest()">💸 Withdraw Request</button>
  <p id="withdrawMsg"></p>
</div>

<div id="betSection" class="section card">
  <h2>⚽ Today's Matches</h2>
  <div id="matchList">Loading...</div>
</div>

<div id="historySection" class="section card">
  <h2>📜 Bet History</h2>
  <div id="historyList">Loading...</div>
</div>

<script type="module">
import {
  db,
  doc,
  updateDoc,
  addDoc,
  collection,
  getDocs,
  query,
  where,
  serverTimestamp
} from "./js/firebase.js";

const user = JSON.parse(localStorage.getItem("m7User"));

if (!user) {
  location.href = "login.html";
}

document.getElementById("name").innerHTML = user.name;
document.getElementById("userid").innerHTML = user.userId;
document.getElementById("balance").innerHTML = Number(user.balance || 0) + " W";

window.showSection = function(id){
  document.querySelectorAll(".section").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
};

async function loadMatches(){

  const matchList = document.getElementById("matchList");
  matchList.innerHTML = "";

  const snap = await getDocs(collection(db,"matches"));

  if(snap.empty){
    matchList.innerHTML = "No Matches";
    return;
  }

  snap.forEach((d)=>{

    const m = d.data();

    const now = new Date();
    const matchTime = new Date(m.matchTime);
    const isClosed = now >= matchTime;
    const statusText = isClosed ? "CLOSED" : (m.status || "OPEN");

    matchList.innerHTML += `
    <div class="card">

      <h3 class="green">🏆 ${m.league}</h3>

      <div style="display:flex;justify-content:space-between;align-items:center;margin:20px 0;">
        <div class="red">🔴 ${m.homeTeam}</div>
        <div><b>VS</b></div>
        <div class="blue">🔵 ${m.awayTeam}</div>
      </div>

      <p>⏰ ${m.matchTime}</p>

      <div style="display:flex;justify-content:space-around;margin:15px 0;">
        <div>🏠<br><b>${m.homeOdd || "-"}</b></div>
        <div>🤝<br><b>${m.drawOdd || "-"}</b></div>
        <div>✈️<br><b>${m.awayOdd || "-"}</b></div>
      </div>

      <div style="display:flex;justify-content:space-around;margin:15px 0;">
        <div>⬆️ Over<br><b>${m.overOdd || "-"}</b></div>
        <div>⬇️ Under<br><b>${m.underOdd || "-"}</b></div>
      </div>

      <p><span class="badge">${statusText}</span></p>

      ${isClosed ? "<p style='color:#ff4444;font-weight:bold;'>လောင်းပိတ်ထားပါပြီ</p>" : `

      <input id="stake_${d.id}" type="number" placeholder="လောင်းငွေ W">

      <button class="smallBtn" onclick="placeBet('${d.id}','home','${m.homeTeam}','${m.homeOdd || ""}')">🔴 Home</button>
      <button class="smallBtn" onclick="placeBet('${d.id}','draw','Draw','${m.drawOdd || ""}')">🤝 Draw</button>
      <button class="smallBtn" onclick="placeBet('${d.id}','away','${m.awayTeam}','${m.awayOdd || ""}')">🔵 Away</button>
      <button class="smallBtn" onclick="placeBet('${d.id}','over','Over 2.5','${m.overOdd || ""}')">⬆️ Over</button>
      <button class="smallBtn" onclick="placeBet('${d.id}','under','Under 2.5','${m.underOdd || ""}')">⬇️ Under</button>

      `}

    </div>
    `;
  });
}

window.depositRequest = async function(){

  const amount = Number(document.getElementById("depositAmount").value);

  if(!amount || amount <= 0){
    document.getElementById("msg").innerHTML = "Enter Amount";
    return;
  }

  await addDoc(collection(db,"deposits"),{
    userId:user.userId,
    name:user.name,
    amount:amount,
    status:"pending",
    createdAt:serverTimestamp()
  });

  document.getElementById("msg").innerHTML = "Deposit Request Sent";
  document.getElementById("depositAmount").value = "";
};

window.withdrawRequest = async function(){

  const amount = Number(document.getElementById("withdrawAmount").value);

  if(!amount || amount <= 0){
    document.getElementById("withdrawMsg").innerHTML = "Enter Amount";
    return;
  }

  if(amount > Number(user.balance || 0)){
    document.getElementById("withdrawMsg").innerHTML = "Balance မလောက်ပါ";
    return;
  }

  await addDoc(collection(db,"withdraws"),{
    userId:user.userId,
    name:user.name,
    amount:amount,
    status:"pending",
    createdAt:serverTimestamp()
  });

  document.getElementById("withdrawMsg").innerHTML = "Withdraw Request Sent";
  document.getElementById("withdrawAmount").value = "";
};

window.placeBet = async function(matchId,type,team,odd){

  const amount = Number(document.getElementById("stake_"+matchId).value);

  if(!amount || amount <= 0){
    alert("လောင်းငွေထည့်ပါ");
    return;
  }

  if(amount > Number(user.balance || 0)){
    alert("လက်ကျန်ငွေမလုံလောက်ပါ");
    return;
  }

  const userRef = doc(db,"users",user.userId);
  const newBalance = Number(user.balance || 0) - amount;

  await updateDoc(userRef,{
    balance:newBalance
  });

  user.balance = newBalance;
  localStorage.setItem("m7User", JSON.stringify(user));
  document.getElementById("balance").innerHTML = newBalance + " W";

  await addDoc(collection(db,"bets"),{
    matchId:matchId,
    userId:user.userId,
    name:user.name,
    betType:type,
    team:team,
    odd:odd,
    amount:amount,
    status:"pending",
    createdAt:serverTimestamp()
  });

  alert("လောင်းထားပြီးပါပြီ");
  loadHistory();
  document.getElementById("stake_"+matchId).value = "";
};

async function loadHistory(){

  const historyList = document.getElementById("historyList");
  historyList.innerHTML = "";

  const q = query(
    collection(db,"bets"),
    where("userId","==",user.userId)
  );

  const snap = await getDocs(q);

  if(snap.empty){
    historyList.innerHTML = "No Bet History";
    return;
  }

  snap.forEach((d)=>{
    const b = d.data();

    historyList.innerHTML += `
      <div class="card">
        <b>${b.team}</b><br>
        Amount: ${b.amount} W<br>
        Odd: ${b.odd || "-"}<br>
        Status: <b>${String(b.status).toUpperCase()}</b><br>
        Win Amount: ${b.winAmount || 0} W
      </div>
    `;
  });
}

window.logout = function(){
  localStorage.removeItem("m7User");
  location.href = "login.html";
};

loadMatches();
loadHistory();

</script>

</body>
</html>
