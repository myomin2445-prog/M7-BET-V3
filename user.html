<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M7 BET - User</title>

<style>
body{
margin:0;
background:#111;
font-family:Arial;
color:white;
}

.header{
background:#00b300;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.card{
width:90%;
max-width:400px;
margin:30px auto;
background:#222;
padding:20px;
border-radius:15px;
text-align:center;
}

.balance{
font-size:35px;
color:#00ff66;
margin:20px 0;
}

button{
width:100%;
padding:15px;
background:#00b300;
color:white;
border:none;
border-radius:10px;
font-size:18px;
margin-top:10px;
}
</style>

</head>

<body>

<div class="header">
⚽ M7 BET
</div>

<div class="card">

<h2 id="name"></h2>

<p>User ID</p>

<h3 id="userid"></h3>

<div class="balance" id="balance"></div>

<button onclick="logout()">
Logout
</button>

</div>
<div class="card">

<h2>Deposit</h2>

<input type="number" id="depositAmount" placeholder="Amount W">

<button onclick="depositRequest()">Deposit Request</button>

<p id="msg"></p>

</div>
  <div class="card">
<h2>Withdraw</h2>

<input type="number" id="withdrawAmount" placeholder="Amount W">

<button onclick="withdrawRequest()">Withdraw Request</button>

<p id="withdrawMsg"></p>

</div>
  <div class="card">

<h2>⚽ Today's Matches</h2>

<div id="matchList">
Loading...
</div>

</div>
<script type="module">
import {
  db,
  addDoc,
  collection,
  getDocs,
  serverTimestamp
} from "./js/firebase.js";

const user = JSON.parse(localStorage.getItem("m7User"));

if (!user) {
  location.href = "login.html";
}

document.getElementById("name").innerHTML = user.name;
document.getElementById("userid").innerHTML = user.userId;
document.getElementById("balance").innerHTML = "₩ " + user.balance;
async function loadMatches(){

const matchList = document.getElementById("matchList");
matchList.innerHTML = "";

const snap = await getDocs(collection(db,"matches"));

snap.forEach((d)=>{

const m = d.data();

matchList.innerHTML += `
<div class="card">

<h3>${m.homeTeam} vs ${m.awayTeam}</h3>

<p>${m.league}</p>

<p>⏰ ${m.matchTime}</p>

<p>Status : ${m.status}</p>

</div>
`;

});

}
  loadMatches();
window.depositRequest = async function () {
  const amount = document.getElementById("depositAmount").value;

  if (!amount) {
    document.getElementById("msg").innerHTML = "Enter Amount";
    return;
  }

  await addDoc(collection(db, "deposits"), {
    userId: user.userId,
    name: user.name,
    amount: Number(amount),
    status: "pending",
    createdAt: serverTimestamp()
  });

  document.getElementById("msg").innerHTML = "Deposit Request Sent";
  document.getElementById("depositAmount").value = "";
};
window.withdrawRequest = async function () {

  const amount = document.getElementById("withdrawAmount").value;

  if (!amount) {
    document.getElementById("withdrawMsg").innerHTML = "Enter Amount";
    return;
  }

  await addDoc(collection(db, "withdraws"), {
    userId: user.userId,
    name: user.name,
    amount: Number(amount),
    status: "pending",
    createdAt: serverTimestamp()
  });

  document.getElementById("withdrawMsg").innerHTML = "Withdraw Request Sent";
  document.getElementById("withdrawAmount").value = "";

};
window.logout = function () {
  localStorage.removeItem("m7User");
  location.href = "login.html";
};
</script>

</body>
</html>
